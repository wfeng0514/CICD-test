  # ── 发布阶段 ─────────────────────────────────────────
  release:
    name: Create Release # 创建 GitHub Release
    runs-on: ubuntu-latest
    needs: deploy # 等待 deploy 成功后才执行
    if: github.event.inputs.environment == 'production' || github.ref == 'refs/heads/main' # 仅 production 部署或 push main 时创建 Release，staging 跳过
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate release tag # 自动生成版本号
        id: tag # 给 step 起名，后面的 step 可以通过 steps.tag.outputs.tag 引用
        run: |
          TAG="v$(date +'%Y.%m.%d')-${GITHUB_SHA::7}" # 格式：v2026.07.16-b56ae2d（日期 + commit 前7位）
          echo "tag=$TAG" >> $GITHUB_OUTPUT # 输出到 $GITHUB_OUTPUT，供后续 step 使用
          echo "Generated tag: $TAG"

      - name: Create GitHub Release # 使用社区 Action 自动创建 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }} # 引用上一步生成的 tag
          name: Release ${{ steps.tag.outputs.tag }}
          body: | # Release 描述（Markdown）
            ## 🚀 Release ${{ steps.tag.outputs.tag }}

            - **Commit:** ${{ github.sha }}
            - **Branch:** ${{ github.ref_name }}
            - **Triggered by:** @${{ github.actor }}

            Auto-generated release from CD pipeline.
          draft: false # 不是草稿，直接发布
          prerelease: false # 不是预发布版本，是正式 Release
