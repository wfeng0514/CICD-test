name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Lint ──────────────────────────────────────────────
  lint:
    name: Lint # 面板上显示的名字
    runs-on: ubuntu-latest # 运行环境（GitHub 提供的虚拟机）
    steps: # 每一步具体做什么（checkout → 装依赖 → 跑命令）
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npx eslint src/ --max-warnings 0
        # continue-on-error: true # 有错误不中断 即使 Lint 报错，job 也显示为通过（绿色），后面的 Test、Build 照常跑。

  # ── Test ──────────────────────────────────────────────
  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    needs: lint # 依赖 lint 依赖链 — test 等 lint 跑完，build 等 test 跑完
    strategy:
      matrix:
        node-version: [18, 20, 22] # 多个 node 版本 并行跑多版本（Node 18/20/22 同时测）
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm test

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: matrix.node-version == 20
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ── Build ─────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            src/
            package.json
          retention-days: 7
